services:
  app:
    build: .
    image: steelfullai-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    # Nur intern erreichbar – nach außen geht alles über Caddy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Wird aus der .env-Datei auf dem VPS gelesen (z. B. DOMAIN=deine-domain.de)
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
